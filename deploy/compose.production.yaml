services:
  web:
    build: ..
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      WAITRESS_THREADS: 4
      TRUST_PROXY: 1
      PREFERRED_URL_SCHEME: https
      FLASK_SECRET_KEY: change-me-in-production
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os, urllib.request; port = os.environ.get('PORT', '8000'); response = urllib.request.urlopen(f'http://127.0.0.1:{port}/healthz'); raise SystemExit(0 if response.status == 200 else 1)",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
